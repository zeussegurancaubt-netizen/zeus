<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEUS Segurança Eletrônica</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0f2c;
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 80px 20px;
    background: linear-gradient(#0a0f2c, #11184a);
}

header img {
    max-width: 220px;
    margin-bottom: 20px;
}

h1 {
    font-size: 48px;
    color: #00aaff;
    margin: 0;
}

.subtitle {
    font-size: 22px;
    color: #ccc;
}

/* SERVIÇOS */
.section {
    padding: 60px 20px;
    text-align: center;
}

.servicos {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
}

.card {
    background: #11184a;
    border-radius: 15px;
    padding: 20px;
    width: 280px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* WHATSAPP FIXO */
.botao {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 15px 25px;
    background: #25d366;
    color: white;
    font-weight: bold;
    text-decoration: none;
    border-radius: 50px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    background: #050814;
    color: #888;
}
</style>

</head>
<body>

<header>
    <img src="logo.png" alt="ZEUS Logo">
    <h1>ZEUS</h1>
    <div class="subtitle">Segurança Eletrônica</div>
    <p>Proteção inteligente para sua casa e empresa</p>
</header>

<section class="section">
    <h2>Nossos Serviços</h2>

    <div class="servicos">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1581091215367-59ab6b2b0f2c">
            <h3>Câmeras</h3>
            <p>Monitoramento 24h com qualidade profissional</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1598514982845-5d0f74f46c91">
            <h3>Alarmes</h3>
            <p>Sistemas modernos de proteção</p>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1603791440384-56cd371ee9a7">
            <h3>Cerca Elétrica</h3>
            <p>Segurança reforçada para seu imóvel</p>
        </div>
    </div>
</section>

<a class="botao" href="https://wa.me/5512996461504">
    📲 WhatsApp
</a>

<footer>
    © 2026 ZEUS Segurança Eletrônica
</footer>

</body>
</html>
